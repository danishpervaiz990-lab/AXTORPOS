<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXTOR POS Cloud - Add Product</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7f6;
      color: #1f2937;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #0f3d2e;
      color: #fff;
      padding: 20px 14px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 25px;
      padding: 8px 10px;
    }

    .brand span {
      color: #38d39f;
    }

    .menu a {
      display: block;
      color: #d1fae5;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .menu a:hover,
    .menu a.active {
      background: #145c43;
      color: #fff;
    }

    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 24px;
    }

    .topbar {
      background: #fff;
      border-radius: 16px;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .topbar h1 {
      font-size: 26px;
      color: #0f3d2e;
    }

    .topbar p {
      color: #6b7280;
      margin-top: 4px;
      font-size: 14px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .btn-primary {
      background: #0f9f6e;
      color: #fff;
    }

    .btn-primary:hover {
      background: #0b8159;
    }

    .btn-light {
      background: #e8f5ef;
      color: #0f3d2e;
    }

    .form-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      padding: 22px;
      max-width: 1050px;
    }

    .section-title {
      font-size: 18px;
      color: #0f3d2e;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e5e7eb;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: span 3;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 7px;
      color: #374151;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #0f9f6e;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid #e5e7eb;
      padding-top: 18px;
    }

    .msg {
      display: none;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #dcfce7;
      color: #166534;
      font-weight: 600;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .app {
        flex-direction: column;
      }

      .main {
        margin-left: 0;
        width: 100%;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full {
        grid-column: span 1;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="brand">AXTOR <span>POS</span></div>

      <nav class="menu">
        <a href="index.html">Dashboard</a>
        <a href="sales.html">Sales</a>
        <a href="new-sale.html">New Sale</a>
        <a href="payment.html">Payment</a>
        <a href="saved-invoices.html">Saved Invoices</a>
        <a href="returns.html">Returns</a>
        <a href="invoice.html">Invoice</a>
        <a href="customers.html">Customers</a>
        <a href="add-customer.html">Add Customer</a>
        <a href="products.html">Products</a>
        <a href="add-product.html" class="active">Add Product</a>
      </nav>
    </aside>

    <main class="main">

      <div class="topbar">
        <div>
          <h1>Add Product</h1>
          <p>Create new product with stock, price and category details</p>
        </div>

        <button class="btn btn-light" onclick="goBack()">Back to Products</button>
      </div>

      <div class="form-card">
        <div class="msg" id="successMsg">Product saved successfully.</div>

        <form id="productForm">
          <h2 class="section-title">Product Information</h2>

          <div class="form-grid">
            <div class="form-group">
              <label>Product Name *</label>
              <input type="text" id="name" placeholder="Example: 2K Automotive Paint" required />
            </div>

            <div class="form-group">
              <label>SKU *</label>
              <input type="text" id="sku" placeholder="Example: AX-PNT-001" required />
            </div>

            <div class="form-group">
              <label>Barcode</label>
              <input type="text" id="barcode" placeholder="Scan or type barcode" />
            </div>

            <div class="form-group">
              <label>Category *</label>
              <select id="category" required>
                <option value="">Select Category</option>
                <option value="Automotive Paint">Automotive Paint</option>
                <option value="Industrial Paint">Industrial Paint</option>
                <option value="Thinner">Thinner</option>
                <option value="Primer">Primer</option>
                <option value="Clear Coat">Clear Coat</option>
                <option value="Tools">Tools</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label>Brand</label>
              <input type="text" id="brandName" placeholder="Example: Starlux" />
            </div>

            <div class="form-group">
              <label>Unit</label>
              <select id="unit">
                <option value="PCS">PCS</option>
                <option value="LTR">LTR</option>
                <option value="Gallon">Gallon</option>
                <option value="KG">KG</option>
                <option value="Box">Box</option>
              </select>
            </div>

            <div class="form-group full">
              <label>Description</label>
              <textarea id="description" placeholder="Write product description..."></textarea>
            </div>
          </div>

          <h2 class="section-title">Price & Stock</h2>

          <div class="form-grid">
            <div class="form-group">
              <label>Sale Price QAR *</label>
              <input type="number" id="salePrice" min="0" step="0.01" required />
            </div>

            <div class="form-group">
              <label>Cost Price QAR *</label>
              <input type="number" id="cost" min="0" step="0.01" required />
            </div>

            <div class="form-group">
              <label>Tax %</label>
              <input type="number" id="tax" min="0" step="0.01" value="0" />
            </div>

            <div class="form-group">
              <label>Opening Stock *</label>
              <input type="number" id="stock" min="0" step="1" value="0" required />
            </div>

            <div class="form-group">
              <label>Minimum Stock Alert</label>
              <input type="number" id="minStock" min="0" step="1" value="5" />
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn btn-light" onclick="clearForm()">Clear</button>
            <button type="submit" class="btn btn-primary">Save Product</button>
          </div>
        </form>
      </div>

    </main>
  </div>

  <script>
    const defaultProducts = [
      {
        id: 1,
        name: "2K Automotive Paint",
        sku: "AX-PNT-001",
        category: "Automotive Paint",
        barcode: "8901001001",
        salePrice: 120,
        cost: 85,
        stock: 24,
        minStock: 5,
        tax: 0,
        brandName: "Starlux",
        unit: "LTR",
        description: "",
        status: "Active"
      },
      {
        id: 2,
        name: "HS Clear Coat 1L",
        sku: "AX-CLR-001",
        category: "Clear Coat",
        barcode: "8901001002",
        salePrice: 45,
        cost: 30,
        stock: 4,
        minStock: 5,
        tax: 0,
        brandName: "Diamond Paints",
        unit: "LTR",
        description: "",
        status: "Active"
      }
    ];

    function getProducts() {
      let products = localStorage.getItem("products");

      if (!products) {
        localStorage.setItem("products", JSON.stringify(defaultProducts));
        return defaultProducts;
      }

      return JSON.parse(products);
    }

    function saveProducts(products) {
      localStorage.setItem("products", JSON.stringify(products));
    }

    document.getElementById("productForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const products = getProducts();

      const product = {
        id: Date.now(),
        name: document.getElementById("name").value.trim(),
        sku: document.getElementById("sku").value.trim(),
        barcode: document.getElementById("barcode").value.trim() || "N/A",
        category: document.getElementById("category").value,
        brandName: document.getElementById("brandName").value.trim(),
        unit: document.getElementById("unit").value,
        description: document.getElementById("description").value.trim(),
        salePrice: Number(document.getElementById("salePrice").value),
        cost: Number(document.getElementById("cost").value),
        tax: Number(document.getElementById("tax").value || 0),
        stock: Number(document.getElementById("stock").value),
        minStock: Number(document.getElementById("minStock").value || 0),
        status: document.getElementById("status").value
      };

      if (!product.name || !product.sku || !product.category) {
        alert("Please fill all required fields.");
        return;
      }

      const duplicateSku = products.some(p => p.sku.toLowerCase() === product.sku.toLowerCase());

      if (duplicateSku) {
        alert("This SKU already exists. Please enter another SKU.");
        return;
      }

      products.push(product);
      saveProducts(products);

      document.getElementById("successMsg").style.display = "block";
      document.getElementById("productForm").reset();

      setTimeout(() => {
        window.location.href = "products.html";
      }, 700);
    });

    function clearForm() {
      document.getElementById("productForm").reset();
      document.getElementById("successMsg").style.display = "none";
    }

    function goBack() {
      window.location.href = "products.html";
    }
  </script>
</body>
</html>
