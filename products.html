<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="assets/css/theme.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXTOR POS - Products</title>
<link rel="stylesheet" href="assets/css/theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      background: #f4f7f6;
      color: #1f2937;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #0f766e;
      color: white;
      padding: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .nav a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.18);
    }

    .main {
      flex: 1;
      padding: 25px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .topbar h1 {
      font-size: 28px;
      color: #0f766e;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h3 {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 24px;
      font-weight: bold;
      color: #0f766e;
    }

    .toolbar {
      background: white;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      width: 100%;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0f766e;
    }

    .search-box {
      max-width: 350px;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: #0f766e;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-warning {
      background: #f59e0b;
      color: white;
    }

    .btn-small {
      padding: 7px 10px;
      font-size: 12px;
      margin-right: 5px;
    }

    .table-box {
      background: white;
      border-radius: 12px;
      overflow: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 13px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #ecfdf5;
      color: #065f46;
    }

    .badge {
      padding: 5px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .in-stock {
      background: #dcfce7;
      color: #166534;
    }

    .low-stock {
      background: #fef3c7;
      color: #92400e;
    }

    .out-stock {
      background: #fee2e2;
      color: #991b1b;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 15px;
    }

    .modal-content {
      background: white;
      width: 720px;
      max-width: 100%;
      border-radius: 14px;
      padding: 22px;
      max-height: 90vh;
      overflow: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-header h2 {
      color: #0f766e;
    }

    .close {
      font-size: 26px;
      cursor: pointer;
      color: #6b7280;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #374151;
      font-weight: bold;
    }

    .full {
      grid-column: 1 / -1;
    }

    .modal-footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 850px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">AXTOR POS</div>
      <nav class="nav">
        <a href="index.html">Dashboard</a>
        <a href="sales.html">Sales</a>
        <a href="customers.html">Customers</a>
        <a href="products.html" class="active">Products</a>
        <a href="settings.html">Settings</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Products</h1>
        <button class="btn-primary" onclick="openProductModal()">+ Add Product</button>
      </div>

      <section class="cards">
        <div class="card">
          <h3>Total Products</h3>
          <p id="totalProducts">0</p>
        </div>
        <div class="card">
          <h3>Total Stock</h3>
          <p id="totalStock">0</p>
        </div>
        <div class="card">
          <h3>Stock Value</h3>
          <p id="stockValue">0</p>
        </div>
        <div class="card">
          <h3>Low Stock</h3>
          <p id="lowStock">0</p>
        </div>
      </section>

      <section class="toolbar">
        <input
          class="search-box"
          type="text"
          id="searchInput"
          placeholder="Search by product, SKU, category..."
          oninput="loadProducts()"
        />

        <div style="display:flex; gap:10px;">
          <button class="btn-secondary" onclick="seedDemoProducts()">Demo Data</button>
          <button class="btn-danger" onclick="clearProducts()">Clear All</button>
        </div>
      </section>

      <section class="table-box">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>SKU</th>
              <th>Category</th>
              <th>Cost</th>
              <th>Sale Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Value</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Product</h2>
        <span class="close" onclick="closeProductModal()">&times;</span>
      </div>

      <form id="productForm">
        <input type="hidden" id="productId" />

        <div class="form-grid">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="productName" placeholder="Example: 2K Clear Coat" />
          </div>

          <div class="form-group">
            <label>SKU / Code</label>
            <input type="text" id="productSku" placeholder="Example: AX-001" />
          </div>

          <div class="form-group">
            <label>Category</label>
            <select id="productCategory">
              <option value="">Select Category</option>
              <option value="Automotive Paint">Automotive Paint</option>
              <option value="Industrial Paint">Industrial Paint</option>
              <option value="Wood Paint">Wood Paint</option>
              <option value="Thinner">Thinner</option>
              <option value="Primer">Primer</option>
              <option value="Clear Coat">Clear Coat</option>
              <option value="Hardener">Hardener</option>
              <option value="Putty">Putty</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Unit</label>
            <select id="productUnit">
              <option value="PCS">PCS</option>
              <option value="LTR">LTR</option>
              <option value="GAL">GAL</option>
              <option value="KG">KG</option>
              <option value="BOX">BOX</option>
            </select>
          </div>

          <div class="form-group">
            <label>Cost Price</label>
            <input type="number" id="costPrice" placeholder="0" />
          </div>

          <div class="form-group">
            <label>Sale Price</label>
            <input type="number" id="salePrice" placeholder="0" />
          </div>

          <div class="form-group">
            <label>Opening Stock</label>
            <input type="number" id="productStock" placeholder="0" />
          </div>

          <div class="form-group">
            <label>Low Stock Alert</label>
            <input type="number" id="lowStockAlert" placeholder="5" />
          </div>

          <div class="form-group full">
            <label>Description</label>
            <textarea id="productDescription" rows="3" placeholder="Product details..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeProductModal()">Cancel</button>
          <button type="button" class="btn-primary" onclick="saveProduct()">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function getValue(id) {
      const el = document.getElementById(id);
      if (!el || el.value === undefined || el.value === null) return "";
      return String(el.value).trim();
    }

    function getNumber(id) {
      const value = Number(getValue(id));
      return isNaN(value) ? 0 : value;
    }

    function getProducts() {
      try {
        return JSON.parse(localStorage.getItem("products") || "[]");
      } catch (e) {
        return [];
      }
    }

    function setProducts(products) {
      localStorage.setItem("products", JSON.stringify(products));
    }

    function openProductModal(id = null) {
      document.getElementById("productModal").style.display = "flex";
      document.getElementById("productForm").reset();
      document.getElementById("productId").value = "";

      if (id) {
        editProduct(id);
      } else {
        document.getElementById("modalTitle").innerText = "Add Product";
      }
    }

    function closeProductModal() {
      document.getElementById("productModal").style.display = "none";
      document.getElementById("productForm").reset();
      document.getElementById("productId").value = "";
    }

    function saveProduct() {
      const id = getValue("productId");

      const product = {
        id: id || String(Date.now()),
        name: getValue("productName"),
        sku: getValue("productSku"),
        category: getValue("productCategory"),
        unit: getValue("productUnit") || "PCS",
        costPrice: getNumber("costPrice"),
        salePrice: getNumber("salePrice"),
        stock: getNumber("productStock"),
        lowStockAlert: getNumber("lowStockAlert") || 5,
        description: getValue("productDescription"),
        updatedAt: new Date().toISOString()
      };

      if (!product.name) {
        alert("Please enter product name");
        return;
      }

      let products = getProducts();

      const existingIndex = products.findIndex(p => String(p.id) === String(product.id));

      if (existingIndex >= 0) {
        product.createdAt = products[existingIndex].createdAt || new Date().toISOString();
        products[existingIndex] = product;
      } else {
        product.createdAt = new Date().toISOString();
        products.push(product);
      }

      setProducts(products);
      closeProductModal();
      loadProducts();

      alert("Product saved successfully");
    }

    function editProduct(id) {
      const products = getProducts();
      const product = products.find(p => String(p.id) === String(id));

      if (!product) {
        alert("Product not found");
        return;
      }

      document.getElementById("modalTitle").innerText = "Edit Product";

      document.getElementById("productId").value = product.id || "";
      document.getElementById("productName").value = product.name || "";
      document.getElementById("productSku").value = product.sku || "";
      document.getElementById("productCategory").value = product.category || "";
      document.getElementById("productUnit").value = product.unit || "PCS";
      document.getElementById("costPrice").value = product.costPrice || 0;
      document.getElementById("salePrice").value = product.salePrice || 0;
      document.getElementById("productStock").value = product.stock || 0;
      document.getElementById("lowStockAlert").value = product.lowStockAlert || 5;
      document.getElementById("productDescription").value = product.description || "";
    }

    function deleteProduct(id) {
      if (!confirm("Delete this product?")) return;

      let products = getProducts();
      products = products.filter(p => String(p.id) !== String(id));
      setProducts(products);
      loadProducts();
    }

    function stockStatus(product) {
      const stock = Number(product.stock) || 0;
      const low = Number(product.lowStockAlert) || 5;

      if (stock <= 0) {
        return '<span class="badge out-stock">Out Stock</span>';
      }

      if (stock <= low) {
        return '<span class="badge low-stock">Low Stock</span>';
      }

      return '<span class="badge in-stock">In Stock</span>';
    }

    function loadProducts() {
      const tbody = document.getElementById("productTableBody");
      const search = getValue("searchInput").toLowerCase();

      let products = getProducts();

      if (search) {
        products = products.filter(p =>
          String(p.name || "").toLowerCase().includes(search) ||
          String(p.sku || "").toLowerCase().includes(search) ||
          String(p.category || "").toLowerCase().includes(search)
        );
      }

      tbody.innerHTML = "";

      if (products.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="9" style="text-align:center; padding:25px; color:#6b7280;">
              No products found
            </td>
          </tr>
        `;
        updateSummary();
        return;
      }

      products.forEach(product => {
        const cost = Number(product.costPrice) || 0;
        const sale = Number(product.salePrice) || 0;
        const stock = Number(product.stock) || 0;
        const value = cost * stock;

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>
            <strong>${escapeHtml(product.name || "")}</strong><br>
            <small>${escapeHtml(product.description || "")}</small>
          </td>
          <td>${escapeHtml(product.sku || "-")}</td>
          <td>${escapeHtml(product.category || "-")}</td>
          <td>QAR ${cost.toFixed(2)}</td>
          <td>QAR ${sale.toFixed(2)}</td>
          <td>${stock} ${escapeHtml(product.unit || "PCS")}</td>
          <td>${stockStatus(product)}</td>
          <td>QAR ${value.toFixed(2)}</td>
          <td>
            <button class="btn-warning btn-small" onclick="openProductModal('${product.id}')">Edit</button>
            <button class="btn-danger btn-small" onclick="deleteProduct('${product.id}')">Delete</button>
          </td>
        `;

        tbody.appendChild(row);
      });

      updateSummary();
    }

    function updateSummary() {
      const products = getProducts();

      const totalProducts = products.length;
      const totalStock = products.reduce((sum, p) => sum + (Number(p.stock) || 0), 0);
      const stockValue = products.reduce((sum, p) => {
        return sum + ((Number(p.costPrice) || 0) * (Number(p.stock) || 0));
      }, 0);

      const lowStock = products.filter(p => {
        const stock = Number(p.stock) || 0;
        const low = Number(p.lowStockAlert) || 5;
        return stock <= low;
      }).length;

      document.getElementById("totalProducts").innerText = totalProducts;
      document.getElementById("totalStock").innerText = totalStock;
      document.getElementById("stockValue").innerText = "QAR " + stockValue.toFixed(0);
      document.getElementById("lowStock").innerText = lowStock;
    }

    function clearProducts() {
      if (!confirm("Are you sure you want to clear all products?")) return;
      localStorage.removeItem("products");
      loadProducts();
    }

    function seedDemoProducts() {
      const demo = [
        {
          id: "P1001",
          name: "2K Clear Coat",
          sku: "AX-CC-001",
          category: "Clear Coat",
          unit: "LTR",
          costPrice: 45,
          salePrice: 65,
          stock: 20,
          lowStockAlert: 5,
          description: "High gloss automotive clear coat",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        },
        {
          id: "P1002",
          name: "NC Thinner",
          sku: "AX-TH-001",
          category: "Thinner",
          unit: "GAL",
          costPrice: 22,
          salePrice: 35,
          stock: 4,
          lowStockAlert: 5,
          description: "NC thinner for paint mixing",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        },
        {
          id: "P1003",
          name: "Epoxy Primer Grey",
          sku: "AX-EP-001",
          category: "Primer",
          unit: "GAL",
          costPrice: 70,
          salePrice: 95,
          stock: 12,
          lowStockAlert: 3,
          description: "Industrial epoxy primer",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }
      ];

      setProducts(demo);
      loadProducts();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    window.onclick = function(event) {
      const modal = document.getElementById("productModal");
      if (event.target === modal) {
        closeProductModal();
      }
    };

    document.addEventListener("DOMContentLoaded", loadProducts);
  </script>
</body>
</html>
