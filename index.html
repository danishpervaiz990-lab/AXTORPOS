<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXTOR POS Cloud</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }
    .wrap {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 45px;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
    }
    h1 {
      font-size: 38px;
      margin-bottom: 8px;
    }
    h1 span {
      color: #2e9b3f;
    }
    p {
      color: #6b7280;
      margin-bottom: 30px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      background: #2e9b3f;
      color: white;
    }
    .btn.secondary {
      background: #0b2034;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AXTOR<span>POS</span></h1>
      <p>Cloud POS system for sales, inventory, invoices and reports.</p>

      <a class="btn" href="sales.html">Open Sales</a>
      <a class="btn secondary" href="new-sale.html">New Sale</a>
      <a class="btn secondary" href="returns.html">Returns</a>
      <a class="btn secondary" href="invoice.html">Invoice Template</a>
    </div>
  </div>
</body>
</html>
